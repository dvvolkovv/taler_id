    </radialGradient>
    <linearGradient id="wave1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0"/>
      <stop offset="30%" stop-color="#8b5cf6" stop-opacity="0.15"/>
      <stop offset="70%" stop-color="#3b82f6" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="wave2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6d28d9" stop-opacity="0"/>
      <stop offset="40%" stop-color="#6d28d9" stop-opacity="0.12"/>
      <stop offset="60%" stop-color="#4f46e5" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#4f46e5" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Base gradient -->
  <rect width="1920" height="1080" fill="url(#base)"/>
  <!-- Radial glows -->
  <rect width="1920" height="1080" fill="url(#glow1)"/>
  <rect width="1920" height="1080" fill="url(#glow2)"/>
  <rect width="1920" height="1080" fill="url(#glow3)"/>
  <!-- Flowing wave shapes -->
  <path d="M0 300 Q480 200 960 350 Q1440 500 1920 350 L1920 550 Q1440 700 960 550 Q480 400 0 500 Z" fill="url(#wave1)"/>
  <path d="M0 500 Q480 400 960 550 Q1440 700 1920 550 L1920 750 Q1440 900 960 750 Q480 600 0 700 Z" fill="url(#wave2)"/>
  <path d="M0 150 Q320 80 640 180 Q960 280 1280 180 Q1600 80 1920 150 L1920 250 Q1600 180 1280 280 Q960 380 640 280 Q320 180 0 250 Z" fill="#7c3aed" opacity="0.06"/>
