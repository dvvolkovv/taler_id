  <circle cx="500" cy="700" r="2" fill="white" opacity="0.1"/>
  <circle cx="1000" cy="800" r="1.5" fill="white" opacity="0.08"/>
  <circle cx="150" cy="500" r="1" fill="white" opacity="0.15"/>
  <circle cx="1800" cy="400" r="1" fill="white" opacity="0.12"/>
