  <!-- Subtle orbs -->
  <circle cx="350" cy="250" r="150" fill="#8b5cf6" opacity="0.05"/>
  <circle cx="1500" cy="700" r="200" fill="#3b82f6" opacity="0.05"/>
  <circle cx="960" cy="500" r="250" fill="#6d28d9" opacity="0.04"/>
  <circle cx="1700" cy="200" r="100" fill="#a78bfa" opacity="0.06"/>
  <circle cx="200" cy="800" r="120" fill="#4f46e5" opacity="0.06"/>
